name: Functional CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  functional-tests:
    name: Static + Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Static checks
        run: npm run check:static

      - name: Functional smoke tests
        run: xvfb-run -a npm run test:functional

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
